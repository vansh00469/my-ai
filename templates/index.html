<!DOCTYPE html>
<html>
<head>
<title>My AI</title>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:sans-serif;
}

input, button {
    padding:10px;
    margin:5px;
}

#chat {
    height:350px;
    overflow:auto;
    border:1px solid gray;
    padding:10px;
}

.msg {
    margin:8px;
    padding:8px;
    border-radius:8px;
}

.user {
    color:lightgreen;
}

.ai {
    color:lightblue;
}
</style>
</head>

<body>

<h2>My AI 🤖</h2>

<input id="username" placeholder="Enter username">
<button onclick="login()">Login</button>

<br><br>

<div id="chat"></div>

<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>

<br><br>

<button onclick="pay()">Pay ₹50</button>

<script>
let user = "";

// 🔐 LOGIN
function login(){
    user = document.getElementById("username").value;

    if(user === ""){
        alert("Enter username!");
        return;
    }

    alert("Logged in as " + user);
}

// 💬 SEND
async function send(){
 let m = document.getElementById("msg").value;
 let chat = document.getElementById("chat");

 if(user === ""){
    alert("Login first!");
    return;
 }

 chat.innerHTML += `<div class="msg user">You: ${m}</div>`;

 let typing = document.createElement("div");
 typing.className = "msg ai";
 typing.id = "typing";
 typing.innerHTML = "AI is typing...";
 chat.appendChild(typing);

 let r = await fetch("/chat", {
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
      message: m,
      user: user
  })
 });

 let d = await r.json();

 document.getElementById("typing").remove();

 chat.innerHTML += `<div class="msg ai">AI: ${d.reply}</div>`;
 chat.scrollTop = chat.scrollHeight;
}

// 💳 PAYMENT
async function pay(){
 if(user === ""){
    alert("Login first!");
    return;
 }

 alert("Payment successful 💰");

 await fetch("/payment-success", {
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({ user: user })
 });

 alert("AI unlocked ✅");
}
</script>

</body>
</html>
